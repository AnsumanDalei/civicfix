name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --max-line-length=120 --exclude=migrations,venv \
            --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run migrations
        env:
          DJANGO_SECRET_KEY: ci-test-key
          DB_ENGINE: sqlite
        run: python manage.py migrate

      - name: Run tests
        env:
          DJANGO_SECRET_KEY: ci-test-key
          DB_ENGINE: sqlite
        run: python manage.py test

  build-image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t civicfix:${{ github.sha }} .
